name: multi-agent CI
on:
  push:
    paths:
      - multi-agent/**
      - .github/workflows/multi-agent.yml
  pull_request:
    paths:
      - multi-agent/**
      - .github/workflows/multi-agent.yml

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: multi-agent/go.mod
          cache-dependency-path: multi-agent/go.sum
      - run: go mod tidy -diff
      - run: go vet ./...
      - run: go test ./... -race -count=1 -coverprofile=cover.out
      - run: go test -tags=contract ./tests/contract/...

  helm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-agent
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - run: helm lint ./deploy/charts/observer
      - run: ./deploy/charts/observer/tests/chart_test.sh

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-agent/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest tests/unit
