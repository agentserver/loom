name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: multi-agent/go.mod
          cache-dependency-path: multi-agent/go.sum

      - name: Build release assets
        working-directory: multi-agent
        run: |
          set -euo pipefail
          mkdir -p ../dist

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/driver-agent.linux-amd64 ./cmd/driver-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o ../dist/driver-agent.linux-arm64 ./cmd/driver-agent
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/driver-agent.windows-amd64.exe ./cmd/driver-agent

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/slave-agent.linux-amd64 ./cmd/slave-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o ../dist/slave-agent.linux-arm64 ./cmd/slave-agent
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/slave-agent.windows-amd64.exe ./cmd/slave-agent

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/observer-server.linux-amd64 ./cmd/observer-server
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o ../dist/observer-server.linux-arm64 ./cmd/observer-server

          cp deploy/linux/driver/bootstrap.sh ../dist/bootstrap-driver.sh
          cp deploy/linux/slave/bootstrap.sh ../dist/bootstrap-slave.sh
          cp deploy/linux/observer/bootstrap.sh ../dist/bootstrap-observer.sh

          tar -C deploy/linux/driver/prompts-codex -czf ../dist/driver-codex-prompts.tar.gz .
          scripts/package-driver-skills.sh --repo-root "$GITHUB_WORKSPACE" --tag HEAD --out ../dist/driver-skills.tar.gz

          (cd ../dist && sha256sum * > sha256sums.txt)

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" dist/* --clobber
