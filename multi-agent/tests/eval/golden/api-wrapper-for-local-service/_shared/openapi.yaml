openapi: 3.0.3
info:
  title: local-echo
  version: "0.1.0"
  description: |
    Toy echo service wrapped by the `local_echo_call` MCP. The MCP tool
    surface accepts: `method` (required, one of the path keys below),
    `body` (string|object, optional), `headers` (object, optional), and
    `base_url` (string, optional — overrides the default `servers[0].url`
    so acceptance/negative tests can point the wrapper at a deliberately
    unreachable address without coordinating a service stop).

    Wrapper response shape: `{status, body}`. For `/echo/headers`
    specifically, the wrapper filters the upstream response down to
    only those headers the caller explicitly set in the request —
    transport headers added by the HTTP client (`host`, `user-agent`,
    `accept-encoding`, `content-length`, …) are stripped before the
    `body` map is returned. Without this filter, deep-equal of `body`
    against a literal `{"x_loom_trace": "t-1"}` would be impossible
    against any real client. The wrapper does NOT filter `/echo`,
    `/echo/json`, or `/healthz`: those endpoints' responses pass
    through unchanged (with `/healthz` acceptance using `required_keys`
    for partial match on `uptime_s`).
servers:
  - url: http://localhost:8080
paths:
  /echo:
    post:
      summary: Echo a plain-text body back.
      requestBody:
        required: true
        content:
          text/plain:
            schema: {type: string}
      responses:
        "200":
          description: echoed
          content:
            text/plain:
              schema: {type: string}
  /echo/json:
    post:
      summary: Echo a JSON payload back unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200":
          description: echoed
          content:
            application/json:
              schema: {type: object}
  /echo/headers:
    get:
      summary: Return all received request headers as a JSON object.
      description: |
        Header names in the response are normalized to snake_case lowercase
        (e.g. request `X-Loom-Trace: abc` is echoed as
        `{"x_loom_trace": "abc"}`). This is the固化 MCP wrapper's
        convention so downstream consumers (and the acceptance gate) can
        match keys without per-call case folding. Hyphens become
        underscores; ASCII letters are lowercased.
      responses:
        "200":
          description: headers
          content:
            application/json:
              schema: {type: object, additionalProperties: {type: string}}
  /healthz:
    get:
      summary: Liveness probe.
      responses:
        "200":
          description: alive
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: {type: string, enum: [ok]}
                  uptime_s: {type: number}
