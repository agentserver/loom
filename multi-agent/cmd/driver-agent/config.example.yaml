server:
  url: https://agent.example.com
  name: driver-yuzishu

# Filled by `driver-agent register`. Leave blank for first run.
credentials:
  sandbox_id: ""
  tunnel_token: ""
  proxy_token: ""
  workspace_id: ""
  short_id: ""

discovery:
  display_name: driver-yuzishu
  description: "Local driver agent. Bridges Claude Code to the workspace; serves the user's local files."
  skills: []  # driver does not accept tasks

listen_addr: "127.0.0.1:0"

agent:
  kind: claude
  bin: claude
  workdir: /tmp/driver-workdir   # jail root for write_slave_file source_path
  extra_args: []

planner:
  bin: claude
  timeout_sec: 300

fanout:
  max_concurrency: 4
  subtask_defaults:
    timeout_sec: 900

observer:
  enabled: false
  telemetry_enabled: false
  url: https://observer.example.com
  workspace_id: ws-replace-me
  workspace_name: ""  # optional; recorded only when this workspace is first created
  agent_id: driver-local
  api_key: ak_REPLACE_ME
  token_state_path: /var/lib/loom/driver-local/observer.token

driver_defaults:
  target_display_name: ""        # blank = auto-pick the unique fanout-skilled agent
  task_timeout_sec: 600
  audit_log_dir: ""              # blank = ~/.cache/multi-agent/<short_id>/
  disable_uid_check: false
  max_dir_cache_entries: 50000
  artifact_transport: peer_proxy # peer_proxy | observer_lazy | observer_eager
