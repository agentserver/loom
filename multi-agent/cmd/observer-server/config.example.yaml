listen_addr: ":8090"
db_path: observer.db
workspaces:
  - id: ws-local
    name: Local Workspace
    agents:
      - id: driver-local
        role: driver
        display_name: Driver Local
        token: driver-token
      - id: master-local
        role: master
        display_name: Master Local
        token: master-token
      - id: slave-local
        role: slave
        display_name: Slave Local
        token: slave-token
