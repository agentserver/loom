# observer-server example config.
# Workspaces are created lazily by /api/agents/register based on what the
# agent declares. Only api_keys are operator-managed here.

listen_addr: ":8090"
db_path: observer.db

api_keys:
  - id: ak-personal
    key: REPLACE_ME_OPENSSL_RAND_HEX_32
    note: "main operator key"

store:
  driver: sqlite
  sqlite:
    path: observer.db
  allow_sqlite_in_production: false

object_store:
  driver: filesystem

telemetry:
  enabled: false
