server:
  url: https://agent.example.com
  name: master-agent

credentials:
  sandbox_id: ""
  tunnel_token: ""
  proxy_token: ""
  short_id: ""

claude:
  bin: claude

planner:
  bin: claude
  timeout_sec: 60
  extra_args: []

fanout:
  max_concurrency: 4
  default_policy: best_effort
  policy_by_skill:
    fanout_strict: all_or_nothing
  subtask_defaults:
    timeout_sec: 600
    max_budget_usd: 0

observer:
  enabled: false
  url: https://observer.example.com
  workspace_id: ws-replace-me
  workspace_name: ""  # optional; recorded only when this workspace is first created
  agent_id: master-local
  api_key: ak_REPLACE_ME
  token_state_path: /var/lib/loom/master-local/observer.token

discovery:
  display_name: master_agent
  description: Orchestrator (route + fanout)
  skills:
    - route
    - fanout
