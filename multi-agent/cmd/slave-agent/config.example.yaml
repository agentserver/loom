server:
  url: https://agent.example.com
  name: slave-agent

credentials:
  sandbox_id: ""
  tunnel_token: ""
  proxy_token: ""
  short_id: ""

claude:
  bin: claude
  workdir: ""
  extra_args: []

mcp_servers:
  echo_stdio:
    transport: stdio
    command: /usr/bin/env
    args: ["python3", "-m", "echo_mcp"]
    env:
      LOG_LEVEL: info
  remote_http:
    transport: http
    url: https://mcp.example.com
    headers:
      Authorization: Bearer XXX

discovery:
  display_name: slave_agent
  description: General-purpose task executor with claude + MCP
  skills:
    - chat
    - mcp
    # - register_mcp  # opt-in: register pre-built MCP server files; pair with bash skill for generation
    # - bash  # opt-in deterministic shell execution for trusted workspaces
    # - file  # opt-in stateless file read/write/stat through a native slave-agent executor
    # - claude_permissions  # opt-in task-channel Claude Code permission management

observer:
  enabled: false
  telemetry_enabled: false
  url: https://observer.example.com
  workspace_id: ws-replace-me
  workspace_name: ""  # optional; recorded only when this workspace is first created
  agent_id: slave-local
  api_key: ak_REPLACE_ME
  token_state_path: /var/lib/loom/slave-local/observer.token

# Optional: hardware / runtime resources advertised on the agent card.
# All fields optional. The planner uses these literally to pick a slave for
# register_mcp tasks (e.g., a "needs camera" tool goes to a slave that
# advertises devices: [camera]).
resources:
  cpu:
    cores: 8
    arch: x86_64
  gpu:
    count: 0
  memory_gb: 16
  devices: []
  tags: []
