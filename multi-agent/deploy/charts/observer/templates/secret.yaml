{{- if and .Values.secret.create (not .Values.existingSecret) }}
{{- $legacyEnabled := default false .Values.config.identity.legacyAPIKeys.enabled }}
{{- $agentserverEnabled := default false .Values.config.identity.agentserver.enabled }}
{{- if and (not $legacyEnabled) (not $agentserverEnabled) }}
{{- fail "secret.create=true requires config.identity.legacyAPIKeys.enabled=true or config.identity.agentserver.enabled=true" }}
{{- end }}
{{- if and $legacyEnabled (not .Values.config.apiKeys) }}
{{- fail "secret.create=true with legacy API keys enabled requires at least one config.apiKeys entry" }}
{{- end }}
{{- if and .Values.config.telemetry.enabled (not .Values.config.telemetry.apiKeys) }}
{{- fail "secret.create=true with telemetry.enabled=true requires config.telemetry.apiKeys" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observer.fullname" . }}
  labels:
    {{- include "observer.labels" . | nindent 4 }}
  {{- with .Values.secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  observer.yaml: |
    listen_addr: {{ .Values.config.listenAddr | quote }}
    production: {{ .Values.config.production }}
    identity:
      legacy_api_keys:
        enabled: {{ $legacyEnabled }}
      agentserver:
        enabled: {{ $agentserverEnabled }}
        {{- if $agentserverEnabled }}
        url: {{ required "config.identity.agentserver.url is required when config.identity.agentserver.enabled=true" .Values.config.identity.agentserver.url | quote }}
        fresh_ttl: {{ default "180s" .Values.config.identity.agentserver.freshTTL | quote }}
        stale_grace: {{ default "15m" .Values.config.identity.agentserver.staleGrace | quote }}
        request_timeout: {{ default "2s" .Values.config.identity.agentserver.requestTimeout | quote }}
        cache_capacity: {{ default 65536 .Values.config.identity.agentserver.cacheCapacity }}
        startup_probe: {{ default true .Values.config.identity.agentserver.startupProbe }}
        {{- end }}
    api_keys:
      {{- range .Values.config.apiKeys }}
      - id: {{ .id | quote }}
        key: {{ .key | quote }}
        {{- with .note }}
        note: {{ . | quote }}
        {{- end }}
      {{- end }}
    store:
      driver: {{ .Values.config.store.driver | quote }}
      {{- if eq .Values.config.store.driver "sqlite" }}
      sqlite:
        path: {{ .Values.config.store.sqlite.path | quote }}
      allow_sqlite_in_production: {{ default false .Values.config.store.allowSQLiteInProduction }}
      {{- end }}
      {{- if eq .Values.config.store.driver "postgres" }}
      postgres:
        dsn_env: {{ .Values.config.store.postgres.dsnEnv | quote }}
        max_open_conns: {{ .Values.config.store.postgres.maxOpenConns }}
        max_idle_conns: {{ .Values.config.store.postgres.maxIdleConns }}
        conn_max_lifetime: {{ .Values.config.store.postgres.connMaxLifetime | quote }}
      {{- end }}
    object_store:
      driver: {{ .Values.config.objectStore.driver | quote }}
      {{- if eq .Values.config.objectStore.driver "s3" }}
      s3:
        endpoint: {{ .Values.config.objectStore.s3.endpoint | quote }}
        region: {{ .Values.config.objectStore.s3.region | quote }}
        bucket: {{ .Values.config.objectStore.s3.bucket | quote }}
        use_ssl: {{ .Values.config.objectStore.s3.useSSL }}
        access_key_env: {{ .Values.config.objectStore.s3.accessKeyEnv | quote }}
        secret_key_env: {{ .Values.config.objectStore.s3.secretKeyEnv | quote }}
        presign_ttl: {{ .Values.config.objectStore.s3.presignTTL | quote }}
      {{- end }}
      proxy:
        enabled: {{ default false .Values.config.objectStore.proxy.enabled }}
        max_bytes: {{ .Values.config.objectStore.proxy.maxBytes | int64 }}
    telemetry:
      enabled: {{ .Values.config.telemetry.enabled }}
      {{- if .Values.config.telemetry.apiKeys }}
      api_keys:
        {{- range .Values.config.telemetry.apiKeys }}
        - id: {{ .id | quote }}
          key_env: {{ .keyEnv | quote }}
          workspace_id: {{ .workspaceID | quote }}
          {{- with .note }}
          note: {{ . | quote }}
          {{- end }}
        {{- end }}
      {{- else }}
      api_keys: []
      {{- end }}
      rate_limit:
        per_minute: {{ .Values.config.telemetry.rateLimit.perMinute }}
        burst: {{ .Values.config.telemetry.rateLimit.burst }}
      max_body_bytes: {{ .Values.config.telemetry.maxBodyBytes }}
      retention_days: {{ .Values.config.telemetry.retentionDays }}
  {{- if eq .Values.config.store.driver "postgres" }}
  {{ default "database-url" .Values.config.store.postgres.dsnSecretKey }}: {{ required "secret.databaseUrl is required when secret.create=true and store.driver=postgres" .Values.secret.databaseUrl | quote }}
  {{- end }}
  {{- if eq .Values.config.objectStore.driver "s3" }}
  {{ default "s3-access-key" .Values.config.objectStore.s3.accessKeySecretKey }}: {{ required "secret.s3AccessKey is required when secret.create=true and objectStore.driver=s3" .Values.secret.s3AccessKey | quote }}
  {{ default "s3-secret-key" .Values.config.objectStore.s3.secretKeySecretKey }}: {{ required "secret.s3SecretKey is required when secret.create=true and objectStore.driver=s3" .Values.secret.s3SecretKey | quote }}
  {{- end }}
  {{- if .Values.config.telemetry.enabled }}
  {{- range .Values.config.telemetry.apiKeys }}
  {{- $secretKey := default "telemetry-global-key" .secretKey }}
  {{ $secretKey }}: {{ required (printf "secret.telemetryKeys.%s is required when secret.create=true and telemetry is enabled" $secretKey) (index $.Values.secret.telemetryKeys $secretKey) | quote }}
  {{- end }}
  {{- end }}
{{- end }}
