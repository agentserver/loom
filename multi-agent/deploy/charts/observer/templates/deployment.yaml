apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observer.fullname" . }}
  labels:
    {{- include "observer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "observer.selectorLabels" . | nindent 6 }}
  {{- if .Values.cluster.enabled }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "observer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: observer
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "observer.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $needPostgresWait := and (eq .Values.config.store.driver "postgres") .Values.postgresql.wait.enabled }}
      {{- if or $needPostgresWait .Values.cluster.enabled }}
      initContainers:
        {{- if $needPostgresWait }}
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          env:
            - name: OBSERVER_POSTGRES_WAIT_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: {{ default "database-url" .Values.config.store.postgres.dsnSecretKey }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until pg_isready -d "$OBSERVER_POSTGRES_WAIT_DSN"; do
                sleep 2
              done
          {{- with .Values.postgresql.wait.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: wait-for-observer-schema
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          env:
            - name: OBSERVER_POSTGRES_WAIT_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: {{ default "database-url" .Values.config.store.postgres.dsnSecretKey }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until psql "$OBSERVER_POSTGRES_WAIT_DSN" -v ON_ERROR_STOP=1 -Atc "SELECT 1 FROM telemetry_api_keys LIMIT 1" >/dev/null 2>&1; do
                sleep 2
              done
          {{- with .Values.postgresql.wait.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- if .Values.cluster.enabled }}
        - name: assert-cluster-secret
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              LEN=$(printf '%s' "$CHECK_VAL" | wc -c)
              if [ -z "$CHECK_VAL" ]; then
                  echo "{{ .Values.cluster.secretEnv }}: empty" >&2
                  echo "check that the Secret has key {{ default "cluster-secret" .Values.cluster.secretKey }}" >&2
                  exit 1
              fi
              if [ "$LEN" -lt 64 ]; then
                  echo "{{ .Values.cluster.secretEnv }}: length $LEN < 64 (must be >=64 hex chars / 32 bytes; generate with: openssl rand -hex 32)" >&2
                  exit 1
              fi
              if ! printf '%s' "$CHECK_VAL" | grep -Eq '^[0-9a-fA-F]+$'; then
                  echo "{{ .Values.cluster.secretEnv }}: not a hex string (must contain only 0-9 a-f A-F; generate with: openssl rand -hex 32)" >&2
                  exit 1
              fi
          env:
            - name: CHECK_VAL
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "observer.configSecretName" .) .Values.existingSecret }}
                  key: {{ default "cluster-secret" .Values.cluster.secretKey }}
        {{- end }}
      {{- end }}
      containers:
        - name: observer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/observer/observer.yaml
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.cluster.enabled }}
            - name: internal
              containerPort: {{ .Values.cluster.internalServicePort }}
              protocol: TCP
            {{- end }}
          env:
            {{- if eq .Values.config.store.driver "postgres" }}
            - name: {{ .Values.config.store.postgres.dsnEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: {{ default "database-url" .Values.config.store.postgres.dsnSecretKey }}
            {{- end }}
            {{- if eq .Values.config.objectStore.driver "s3" }}
            - name: {{ .Values.config.objectStore.s3.accessKeyEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: {{ default "s3-access-key" .Values.config.objectStore.s3.accessKeySecretKey }}
            - name: {{ .Values.config.objectStore.s3.secretKeyEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: {{ default "s3-secret-key" .Values.config.objectStore.s3.secretKeySecretKey }}
            {{- end }}
            {{- if .Values.config.telemetry.enabled }}
            {{- range .Values.config.telemetry.apiKeys }}
            - name: {{ .keyEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" $ }}
                  key: {{ default "telemetry-global-key" .secretKey }}
            {{- end }}
            {{- end }}
            {{- if .Values.cluster.enabled }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: {{ .Values.cluster.advertiseUrlEnv }}
              value: "http://$(POD_IP):{{ .Values.cluster.internalServicePort }}"
            - name: {{ .Values.cluster.secretEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "observer.configSecretName" .) .Values.existingSecret }}
                  key: {{ default "cluster-secret" .Values.cluster.secretKey }}
            {{- if .Values.cluster.prevSecretEnv }}
            - name: {{ .Values.cluster.prevSecretEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "observer.configSecretName" .) .Values.existingSecret }}
                  key: {{ default "cluster-secret-prev" .Values.cluster.prevSecretKey }}
                  optional: true
            {{- end }}
            {{- end }}
          {{- if .Values.cluster.enabled }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /usr/local/bin/observer-server
                  - --config
                  - /etc/observer/observer.yaml
                  - --drain-local
                  - --internal-port={{ .Values.cluster.internalServicePort }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: observer-config
              mountPath: /etc/observer/observer.yaml
              subPath: observer.yaml
              readOnly: true
            - name: observer-nonsecret-config
              mountPath: /etc/observer/nonsecret
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: observer-config
          secret:
            secretName: {{ include "observer.configSecretName" . }}
        - name: observer-nonsecret-config
          configMap:
            name: {{ include "observer.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
