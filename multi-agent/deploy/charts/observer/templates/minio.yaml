{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observer.minio.fullname" . }}
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  ports:
    - name: api
      port: {{ .Values.minio.service.apiPort }}
      targetPort: api
      protocol: TCP
    - name: console
      port: {{ .Values.minio.service.consolePort }}
      targetPort: console
      protocol: TCP
  selector:
    {{- include "observer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "observer.minio.fullname" . }}
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  serviceName: {{ include "observer.minio.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "observer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "observer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :{{ .Values.minio.service.consolePort }}
          ports:
            - name: api
              containerPort: {{ .Values.minio.service.apiPort }}
              protocol: TCP
            - name: console
              containerPort: {{ .Values.minio.service.consolePort }}
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: minio-root-password
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.minio.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if not .Values.minio.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.minio.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "observer.labels" . | nindent 10 }}
          app.kubernetes.io/component: minio
      spec:
        accessModes:
          {{- toYaml .Values.minio.persistence.accessModes | nindent 10 }}
        {{- with .Values.minio.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "observer.minioBucketJobName" . }}
  labels:
    {{- include "observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  backoffLimit: {{ .Values.minio.bucketJob.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.minio.bucketJob.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "observer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: create-bucket
          image: "{{ .Values.minio.mcImage.repository }}:{{ .Values.minio.mcImage.tag }}"
          imagePullPolicy: {{ .Values.minio.mcImage.pullPolicy }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "observer.configSecretName" . }}
                  key: minio-root-password
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | quote }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until mc alias set local http://{{ include "observer.minio.fullname" . }}:{{ .Values.minio.service.apiPort }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 2
              done
              mc mb --ignore-existing "local/$MINIO_BUCKET"
          {{- with .Values.minio.bucketJob.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
