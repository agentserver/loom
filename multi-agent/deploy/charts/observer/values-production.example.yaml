replicaCount: 3

image:
  repository: registry.nj.cs.ac.cn/loom/observer
  tag: master-latest
  pullPolicy: IfNotPresent

existingSecret: observer-production-secret

gateway:
  # The public HTTPRoute for https://loom.nj.cs.ac.cn:10062/ is
  # platform-managed. CI/CD updates the Service behind it but does not manage
  # Gateway API resources because the deployment identity lacks HTTPRoute RBAC.
  enabled: false
  parentRefs:
    - name: cilium-gateway
      namespace: cilium-gateway
  host: loom.nj.cs.ac.cn

config:
  production: true
  identity:
    legacyAPIKeys:
      enabled: false
    agentserver:
      enabled: true
      url: https://agent.cs.ac.cn
  store:
    driver: postgres
    postgres:
      dsnEnv: OBSERVER_DATABASE_URL
      dsnSecretKey: database-url
      maxOpenConns: 40
      maxIdleConns: 20
      connMaxLifetime: 30m
  objectStore:
    driver: s3
    s3:
      endpoint: http://observer-observer-minio:9000
      region: us-east-1
      bucket: observer-artifacts
      useSSL: false
      accessKeyEnv: OBSERVER_S3_ACCESS_KEY
      accessKeySecretKey: s3-access-key
      secretKeyEnv: OBSERVER_S3_SECRET_KEY
      secretKeySecretKey: s3-secret-key
      presignTTL: 15m
  telemetry:
    enabled: true
    apiKeys:
      - id: ops-global
        keyEnv: OBSERVER_TELEMETRY_KEY_GLOBAL
        secretKey: telemetry-global-key
        workspaceID: "*"
        note: production operations telemetry key
    rateLimit:
      perMinute: 60
      burst: 120
    maxBodyBytes: 262144
    retentionDays: 30

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

migration:
  enabled: true
  # Production CI/CD uses the named Job mode with --wait-for-jobs because the
  # migration container depends on the chart-created Secret.
  useHelmHook: false
  jobNameSuffix: ""

postgresql:
  enabled: true
  auth:
    username: observer
    database: observer
  persistence:
    enabled: true
    storageClassName: csi-rbd-sc
    accessModes:
      - ReadWriteOnce
    size: 20Gi

minio:
  enabled: true
  bucket: observer-artifacts
  persistence:
    enabled: true
    storageClassName: csi-rbd-sc
    accessModes:
      - ReadWriteOnce
    size: 50Gi
