replicaCount: 1

image:
  repository: registry.nj.cs.ac.cn/loom/observer
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8090

gateway:
  enabled: false
  parentRefs:
    - name: cilium-gateway
      namespace: cilium-gateway
  host: observer.example.com

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: observer.example.com
  tls: false
  tlsSecretName: ""

existingSecret: ""

cluster:
  enabled: false
  advertiseUrlEnv: OBSERVER_ADVERTISE_URL
  secretEnv: OBSERVER_CLUSTER_SECRET
  prevSecretEnv: OBSERVER_CLUSTER_SECRET_PREV
  secretKey: cluster-secret
  prevSecretKey: cluster-secret-prev
  internalListenAddr: ":8091"
  internalServicePort: 8091
  headlessServiceName: ""  # default "<release>-observer-headless" computed in _helpers.tpl
  networkPolicy:
    enabled: true

secret:
  create: false
  annotations: {}
  databaseUrl: ""
  s3AccessKey: ""
  s3SecretKey: ""
  telemetryKeys: {}

config:
  production: true
  listenAddr: ":8090"
  apiKeys: []
  identity:
    legacyAPIKeys:
      enabled: false
    agentserver:
      enabled: false
      url: ""
      freshTTL: ""
      revocationChannel: "auto"
      staleGrace: 15m
      requestTimeout: 2s
      cacheCapacity: 65536
      startupProbe: true
  store:
    driver: postgres
    sqlite:
      path: observer.db
    postgres:
      dsnEnv: OBSERVER_DATABASE_URL
      dsnSecretKey: database-url
      maxOpenConns: 20
      maxIdleConns: 10
      connMaxLifetime: 30m
  objectStore:
    driver: s3
    s3:
      endpoint: ""
      region: us-east-1
      bucket: observer-artifacts
      useSSL: true
      accessKeyEnv: OBSERVER_S3_ACCESS_KEY
      accessKeySecretKey: s3-access-key
      secretKeyEnv: OBSERVER_S3_SECRET_KEY
      secretKeySecretKey: s3-secret-key
      presignTTL: 15m
    proxy:
      enabled: false
      maxBytes: 8388608
  telemetry:
    enabled: true
    apiKeys:
      - id: ops-global
        keyEnv: OBSERVER_TELEMETRY_KEY_GLOBAL
        secretKey: telemetry-global-key
        workspaceID: "*"
        note: global operations telemetry key
    rateLimit:
      perMinute: 60
      burst: 120
    maxBodyBytes: 262144
    retentionDays: 30

postgresql:
  enabled: true
  image:
    repository: registry.nj.cs.ac.cn/dockerhub/postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    username: observer
    password: ""
    database: observer
  persistence:
    enabled: true
    storageClassName: csi-rbd-sc
    accessModes:
      - ReadWriteOnce
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  wait:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

minio:
  enabled: true
  image:
    repository: registry.nj.cs.ac.cn/dockerhub/minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  mcImage:
    repository: registry.nj.cs.ac.cn/dockerhub/minio/mc
    tag: latest
    pullPolicy: IfNotPresent
  service:
    apiPort: 9000
    consolePort: 9001
  auth:
    rootUser: ""
    rootPassword: ""
  bucket: observer-artifacts
  persistence:
    enabled: true
    storageClassName: csi-rbd-sc
    accessModes:
      - ReadWriteOnce
    size: 50Gi
  bucketJob:
    backoffLimit: 6
    ttlSecondsAfterFinished: 86400
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

migration:
  enabled: true
  # false renders a named Job for CI/GitOps systems to run explicitly before
  # rollout. true renders a pre-install/pre-upgrade Helm hook Job.
  useHelmHook: false
  # Used only when useHelmHook=false. Defaults to image.tag, or chart
  # appVersion when the tag is "latest"; set it explicitly for CI/GitOps
  # renders that need one migration Job per release.
  jobNameSuffix: ""
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

retention:
  enabled: true
  schedule: "17 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

podAnnotations: {}
podLabels: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
