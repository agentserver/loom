replicaCount: 1

gateway:
  enabled: false

secret:
  create: true
  databaseUrl: postgres://observer:observer@observer-observer-postgresql:5432/observer?sslmode=disable
  s3AccessKey: minioadmin
  s3SecretKey: minioadmin
  telemetryKeys:
    telemetry-global-key: local-telemetry-key

config:
  production: false
  identity:
    legacyAPIKeys:
      enabled: true
    agentserver:
      enabled: false
  apiKeys:
    - id: ak-local
      key: local-observer-api-key
      note: local development key
  store:
    driver: postgres
    postgres:
      dsnEnv: OBSERVER_DATABASE_URL
      dsnSecretKey: database-url
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 30m
  objectStore:
    driver: s3
    s3:
      endpoint: observer-observer-minio:9000
      region: us-east-1
      bucket: observer-artifacts
      useSSL: false
      accessKeyEnv: OBSERVER_S3_ACCESS_KEY
      accessKeySecretKey: s3-access-key
      secretKeyEnv: OBSERVER_S3_SECRET_KEY
      secretKeySecretKey: s3-secret-key
      presignTTL: 15m
  telemetry:
    enabled: true
    apiKeys:
      - id: ops-local
        keyEnv: OBSERVER_TELEMETRY_KEY_GLOBAL
        secretKey: telemetry-global-key
        workspaceID: "*"
        note: local operations telemetry key

postgresql:
  enabled: true
  auth:
    username: observer
    password: observer
    database: observer
  persistence:
    enabled: true
    storageClassName: csi-rbd-sc
    accessModes:
      - ReadWriteOnce
    size: 1Gi

minio:
  enabled: true
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  bucket: observer-artifacts
  persistence:
    enabled: true
    storageClassName: csi-rbd-sc
    accessModes:
      - ReadWriteOnce
    size: 1Gi
