listen_addr: ":8080"
db_path: observer.db

identity:
  legacy_api_keys:
    enabled: true
  agentserver:
    enabled: false
    url: ""
    fresh_ttl: 180s
    stale_grace: 15m
    request_timeout: 2s
    cache_capacity: 65536
    startup_probe: true

api_keys:
  - id: ak-dev
    key: ak_dev_shared_secret
    note: "dev operator key"
