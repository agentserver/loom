listen_addr: ":8080"
db_path: observer.db
workspaces:
  - id: dev
    name: Development Workspace
    agents:
      - id: driver-dev
        role: driver
        display_name: driver-dev
        token: driver-token
      - id: master-dev
        role: master
        display_name: master-dev
        token: master-token
      - id: slave-a-dev
        role: slave
        display_name: slave-a-dev
        token: slave-a-token
      - id: slave-b-dev
        role: slave
        display_name: slave-b-dev
        token: slave-b-token
