server:
  url: http://agentserver:8080
  name: driver-dev

credentials:
  sandbox_id: ""
  tunnel_token: ""
  proxy_token: ""
  workspace_id: ""
  short_id: ""

agent:
  kind: claude
  bin: claude
  workdir: /workspace/multi-agent
  # codex_home: ""  # per-agent CODEX_HOME override; default derives from loom_home + short_id
  # loom_home: ""   # state root for per-agent codex_home (defaults: $LOOM_HOME or $HOME/.cache/multi-agent)

driver_defaults:
  target_display_name: master-dev
  task_timeout_sec: 600
  artifact_transport: observer_lazy

observer:
  enabled: true
  telemetry_enabled: false
  url: http://observer:8080
  workspace_id: dev
  agent_id: driver-dev
  api_key: ak_dev_shared_secret
  token_state_path: /tmp/observer-driver-dev.token

discovery:
  display_name: driver-dev
