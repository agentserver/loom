server:
  url: http://agentserver:8080
  name: master-dev

credentials:
  sandbox_id: ""
  tunnel_token: ""
  proxy_token: ""
  workspace_id: ""
  short_id: ""

claude:
  bin: claude

planner:
  bin: claude

discovery:
  display_name: master-dev
  skills:
    - route
    - fanout

fanout:
  max_concurrency: 3

observer:
  enabled: true
  url: http://observer:8080
  workspace_id: dev
  agent_id: master-dev
  api_key: ak_dev_shared_secret
  token_state_path: /tmp/observer-master-dev.token
