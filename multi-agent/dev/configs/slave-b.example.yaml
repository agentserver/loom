server:
  url: http://agentserver:8080
  name: slave-b-dev

credentials:
  sandbox_id: ""
  tunnel_token: ""
  proxy_token: ""
  workspace_id: ""
  short_id: ""

agent:
  kind: claude
  bin: claude
  workdir: /tmp/slave-b-dev

discovery:
  display_name: slave-b-dev
  skills:
    - chat
    - mcp

observer:
  enabled: true
  telemetry_enabled: false
  url: http://observer:8080
  workspace_id: dev
  agent_id: slave-b-dev
  api_key: ak_dev_shared_secret
  token_state_path: /tmp/observer-slave-b-dev.token

resources:
  memory_gb: 16
  tags:
    - go
    - dev
