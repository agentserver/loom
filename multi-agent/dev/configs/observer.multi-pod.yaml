# Multi-pod observer configuration for local development.
#
# Used by dev/compose.multi-observer.yaml. Each observer instance reads this
# file AND resolves env-indirected fields at startup:
#
#   OBSERVER_DSN           — Postgres DSN (required)
#   OBSERVER_CLUSTER_SECRET — 64-hex-char cluster secret (required; openssl rand -hex 32)
#   OBSERVER_ADVERTISE_URL  — per-instance advertise URL, e.g. http://observer-1:8091
#   AGENTSERVER_URL         — agentserver base URL (optional; disables agentserver if unset)
#
# All cluster.* fields use env indirection so the same file is shared across
# both observer-1 and observer-2 without modification.

listen_addr: ":8090"

store:
  driver: postgres
  postgres:
    dsn_env: OBSERVER_DSN

object_store:
  driver: filesystem

identity:
  legacy_api_keys:
    enabled: true
  agentserver:
    # Stub URL: non-empty so commander routes mount (AgentserverURL != "" is the
    # gate in observerweb). The URL is intentionally unreachable — dev requests
    # authenticate via legacy_api_keys above, not agentserver. real agentserver
    # is NOT required for the multi-pod daemon-registry repro.
    enabled: true
    url: "http://agentserver-stub:9999/dev-only"
    fresh_ttl: 30s
    stale_grace: 15m
    request_timeout: 2s
    cache_capacity: 65536
    startup_probe: false
    revocation_channel: "postgres"

api_keys:
  - id: ak-dev
    key: ak_dev_shared_secret
    note: "dev operator key (multi-pod)"

cluster:
  enabled: true
  advertise_url_env: OBSERVER_ADVERTISE_URL
  secret_env: OBSERVER_CLUSTER_SECRET
  internal_listen_addr: ":8091"
