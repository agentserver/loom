services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentserver
      POSTGRES_USER: agentserver
      POSTGRES_PASSWORD: agentserver
    volumes:
      - agentserver-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentserver -d agentserver"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  agentserver:
    build:
      context: ..
      dockerfile: dev/agent-runtime/Dockerfile
    working_dir: /workspace/multi-agent
    volumes:
      - ../:/workspace/multi-agent
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgres://agentserver:agentserver@postgres:5432/agentserver?sslmode=disable
      ANTHROPIC_BASE_URL: https://code.ai.cs.ac.cn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: zsh -lc "go run github.com/agentserver/agentserver@v0.48.1 serve --db-url postgres://agentserver:agentserver@postgres:5432/agentserver?sslmode=disable --port 8080 --backend docker"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18080:8080"
    restart: unless-stopped

  master:
    build:
      context: ..
      dockerfile: dev/agent-runtime/Dockerfile
    working_dir: /workspace/multi-agent
    volumes:
      - ../:/workspace/multi-agent
      - ./configs/master.yaml:/config/config.yaml
    environment:
      ANTHROPIC_BASE_URL: https://code.ai.cs.ac.cn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: zsh -lc "go run ./cmd/master-agent /config/config.yaml"
    restart: unless-stopped

  driver:
    build:
      context: ..
      dockerfile: dev/agent-runtime/Dockerfile
    working_dir: /workspace/multi-agent
    volumes:
      - ../:/workspace/multi-agent
      - ./configs/driver.yaml:/config/config.yaml
    environment:
      ANTHROPIC_BASE_URL: https://code.ai.cs.ac.cn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: zsh -lc "go run ./cmd/driver-agent serve-mcp --config /config/config.yaml"
    restart: unless-stopped

  slave-a:
    build:
      context: ..
      dockerfile: dev/agent-runtime/Dockerfile
    working_dir: /workspace/multi-agent
    volumes:
      - ../:/workspace/multi-agent
      - ./configs/slave-a.yaml:/config/config.yaml
    environment:
      ANTHROPIC_BASE_URL: https://code.ai.cs.ac.cn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: zsh -lc "go run ./cmd/slave-agent /config/config.yaml"
    restart: unless-stopped

  slave-b:
    build:
      context: ..
      dockerfile: dev/agent-runtime/Dockerfile
    working_dir: /workspace/multi-agent
    volumes:
      - ../:/workspace/multi-agent
      - ./configs/slave-b.yaml:/config/config.yaml
    environment:
      ANTHROPIC_BASE_URL: https://code.ai.cs.ac.cn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: zsh -lc "go run ./cmd/slave-agent /config/config.yaml"
    restart: unless-stopped

  # slave-cloud is the cloud-sandbox tier in the §C1 four-node fleet
  # (Linux laptop driver + Linux headless server slave + Windows
  # desktop slave + cloud sandbox slave). It is a regular slave-agent
  # container with a distinct config that advertises sandbox-style
  # resources/skills, so a local `docker compose up` already exercises
  # the multi-tier capability-discovery path that prod will see across
  # physical machines. The real Windows node is handled by
  # deploy/windows/*/install.ps1 (cannot ship in Linux compose).
  slave-cloud:
    build:
      context: ..
      dockerfile: dev/agent-runtime/Dockerfile
    working_dir: /workspace/multi-agent
    volumes:
      - ../:/workspace/multi-agent
      - ./configs/slave-cloud.yaml:/config/config.yaml
    environment:
      ANTHROPIC_BASE_URL: https://code.ai.cs.ac.cn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: zsh -lc "go run ./cmd/slave-agent /config/config.yaml"
    restart: unless-stopped

  observer:
    build:
      context: ..
      dockerfile: dev/agent-runtime/Dockerfile
    working_dir: /workspace/multi-agent
    volumes:
      - ../:/workspace/multi-agent
      - ./configs/observer.yaml:/config/config.yaml
    environment:
      ANTHROPIC_BASE_URL: https://code.ai.cs.ac.cn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: zsh -lc "go run ./cmd/observer-server --config /config/config.yaml"
    restart: unless-stopped

volumes:
  agentserver-postgres:
